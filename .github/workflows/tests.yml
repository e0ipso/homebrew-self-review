name: tap CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  macos:
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Disable Homebrew API
        run: echo "HOMEBREW_NO_INSTALL_FROM_API=1" >> "$GITHUB_ENV"

      - name: Tap repository
        run: |
          tap_dir="$(brew --repository)/Library/Taps/e0ipso/homebrew-self-review"
          rm -rf "$tap_dir"
          mkdir -p "$(dirname "$tap_dir")"
          ln -s "$GITHUB_WORKSPACE" "$tap_dir"

      - name: Audit cask
        run: brew audit --cask --strict e0ipso/self-review/self-review

      - name: Style cask
        run: brew style --cask e0ipso/self-review/self-review

      - name: Install cask
        run: brew install --cask --verbose e0ipso/self-review/self-review

      - name: Check version
        run: self-review --version 2>&1 | grep "self-review v"

      - name: Uninstall cask
        if: always()
        run: |
          if brew list --cask self-review >/dev/null 2>&1; then
            brew uninstall --cask self-review
          fi

  linux:
    runs-on: ubuntu-latest
    container: ghcr.io/homebrew/brew:main
    permissions:
      contents: read
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Disable Homebrew API
        run: echo "HOMEBREW_NO_INSTALL_FROM_API=1" >> "$GITHUB_ENV"

      - name: Tap repository
        run: |
          tap_dir="$(brew --repository)/Library/Taps/e0ipso/homebrew-self-review"
          rm -rf "$tap_dir"
          mkdir -p "$(dirname "$tap_dir")"
          ln -s "$GITHUB_WORKSPACE" "$tap_dir"

      - name: Audit formula
        run: brew audit --formula --strict e0ipso/self-review/self-review

      - name: Style formula
        run: brew style --formula e0ipso/self-review/self-review

      - name: Install formula
        run: brew install --verbose e0ipso/self-review/self-review

      - name: Check version
        run: self-review --version 2>&1 | grep "self-review v"

      - name: Test formula
        run: brew test self-review

      - name: Uninstall formula
        if: always()
        run: |
          if brew list self-review >/dev/null 2>&1; then
            brew uninstall self-review
          fi
