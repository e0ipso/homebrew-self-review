name: tap CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  macos:
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Disable Homebrew API
        run: echo "HOMEBREW_NO_INSTALL_FROM_API=1" >> "$GITHUB_ENV"

      - name: Audit cask
        run: brew audit --cask --strict e0ipso/self-review/self-review

      - name: Style cask
        run: brew style --cask e0ipso/self-review/self-review

      - name: Install cask
        run: brew install --cask --verbose e0ipso/self-review/self-review

      - name: Check version
        run: self-review --version 2>&1 | grep "self-review v"

      - name: Uninstall cask
        if: always()
        run: |
          if brew list --cask self-review >/dev/null 2>&1; then
            brew uninstall --cask self-review
          fi

  linux:
    runs-on: ubuntu-latest
    container: ghcr.io/homebrew/brew:main
    permissions:
      contents: read
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Disable Homebrew API
        run: echo "HOMEBREW_NO_INSTALL_FROM_API=1" >> "$GITHUB_ENV"

      - name: Install Linux runtime libraries
        run: |
          set -eu
          brew list --formula gcc >/dev/null 2>&1 || HOMEBREW_NO_AUTO_UPDATE=1 brew install --formula gcc
          gcc_lib_dir="$(find "${HOMEBREW_PREFIX}/opt/gcc/lib/gcc" -name libstdc++.so.6 -printf "%h\n" | sort | head -n 1)"
          test -n "${gcc_lib_dir}"
          mkdir -p "${HOMEBREW_PREFIX}/lib"
          ln -sf "${gcc_lib_dir}/libstdc++.so.6" "${HOMEBREW_PREFIX}/lib/libstdc++.so.6"
          test -r "${HOMEBREW_PREFIX}/lib/libstdc++.so.6"

      - name: Audit formula
        run: brew audit --formula --strict e0ipso/self-review/self-review

      - name: Style formula
        run: brew style --formula e0ipso/self-review/self-review

      - name: Install formula
        run: brew install --formula --verbose e0ipso/self-review/self-review

      - name: Check version
        run: self-review --version 2>&1 | grep "self-review v"

      - name: Test formula
        run: brew test self-review

      - name: Uninstall formula
        if: always()
        run: |
          if brew list self-review >/dev/null 2>&1; then
            brew uninstall self-review
          fi
